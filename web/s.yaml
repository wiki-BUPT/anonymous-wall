edition: 3.0.0
name: anonymous-wall
access: default

vars:
  region: cn-hongkong # 阿里云地域，如 cn-beijing, cn-shanghai, cn-hangzhou 等

resources:
  framework:
    component: fc3
    props:
      region: ${vars.region}
      functionName: anonymous-wall-final
      description: 'Anonymous Wall Next.js App'
      runtime: custom.debian10
      customRuntimeConfig:
        command:
          - /opt/nodejs20/bin/node
        args:
          - server.js
        port: 3000
      layers:
        - acs:fc:cn-hongkong:official:layers/Nodejs20/versions/1
      code: .next/standalone
      memorySize: 512
      timeout: 60
      environmentVariables:
        PORT: "3000"
        HOSTNAME: "0.0.0.0"
        # 你的环境变量，部署时会自动读取本地 .env.local 中的值
        NEXT_PUBLIC_SUPABASE_URL: ${env(NEXT_PUBLIC_SUPABASE_URL)}
        SUPABASE_SERVICE_ROLE_KEY: ${env(SUPABASE_SERVICE_ROLE_KEY)}
        JWT_SECRET: ${env(JWT_SECRET)}
